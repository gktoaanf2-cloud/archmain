<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCH // MAINTWEET FORGE</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Share+Tech+Mono&display=swap">
<style>
:root{
  --bg:#050506; --srf:#0e0e10; --srf2:#0a0a0c; --ln1:#26262b; --ln2:#3b3b42;
  --acc:#ffffff; --acc-d:#c9c9cf; --cy:#aeaeb6; --txt:#ededf1; --txt2:#c7c7cd; --dim:#76767e; --dim2:#9b9ba3;
  --hud:'Chakra Petch',sans-serif; --mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.013) 0 1px, transparent 1px 3px),
    radial-gradient(1200px 820px at 68% -12%, #131316 0%, #0a0a0c 50%, #050506 100%);
  color:var(--txt); font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh;
}
body::before{ content:""; position:fixed; inset:0; pointer-events:none; z-index:9; background:linear-gradient(transparent 62%, rgba(0,0,0,.22)); mix-blend-mode:multiply; }
#bgdust{ position:fixed; inset:0; z-index:0; pointer-events:none; display:block; }
.cut{ clip-path:polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 11px 100%, 0 calc(100% - 11px)); }
.wrap{ position:relative; z-index:1; display:flex; gap:22px; align-items:flex-start; max-width:1260px; margin:0 auto; padding:22px 18px 64px; flex-wrap:wrap; }
.panel{ flex:1 1 376px; min-width:308px; }
.stage{ flex:1 1 540px; min-width:300px; position:sticky; top:18px; }
@media(max-width:820px){ .stage{ position:static; order:-1; } }

.topbar{ display:flex; align-items:center; gap:10px; padding:10px 13px; margin-bottom:14px;
  background:linear-gradient(90deg, rgba(255,255,255,.07), rgba(12,13,16,.6)); border:1px solid var(--ln1);
  font-family:var(--hud); font-weight:600; font-size:10.5px; letter-spacing:.18em; color:var(--dim2); }
.topbar .dot{ width:8px; height:8px; background:var(--acc); box-shadow:0 0 9px var(--acc); animation:bk 1.7s infinite; }
.topbar .tt{ color:var(--txt); font-weight:700; letter-spacing:.2em; } .topbar .tt b{ color:var(--acc); }
.topbar .rt{ margin-left:auto; font-family:var(--mono); letter-spacing:.1em; color:var(--cy); opacity:.8; }
@keyframes bk{0%,100%{opacity:1}50%{opacity:.25}}

.mod{ position:relative; background:linear-gradient(180deg,#121216,#0d0d10); border:1px solid var(--ln1); margin-bottom:13px; }
.mod::before,.mod::after{ content:""; position:absolute; width:10px; height:10px; pointer-events:none; }
.mod::before{ top:-1px; left:-1px; border-top:2px solid var(--acc); border-left:2px solid var(--acc); }
.mod::after{ bottom:-1px; right:-1px; border-bottom:2px solid var(--ln2); border-right:2px solid var(--ln2); }
.mh{ display:flex; align-items:center; gap:9px; padding:8px 12px; border-bottom:1px solid var(--ln1); background:linear-gradient(90deg, rgba(255,255,255,.06), transparent 70%); }
.mh .ix{ font-family:var(--mono); font-size:10px; color:var(--acc); } .mh .nm{ font-family:var(--hud); font-weight:600; font-size:11px; letter-spacing:.24em; color:var(--dim2); text-transform:uppercase; }
.mh .fl{ flex:1; height:1px; background:linear-gradient(90deg,var(--ln2),transparent); } .mh .nd{ width:5px; height:5px; background:var(--cy); transform:rotate(45deg); opacity:.7; }
.mb{ padding:11px 12px; } .mb .field+.field{ margin-top:11px; }
.lab{ display:block; font-family:var(--hud); font-size:9.5px; letter-spacing:.17em; font-weight:600; color:var(--dim); text-transform:uppercase; margin-bottom:6px; } .lab i{ color:var(--acc); font-style:normal; }
.two{ display:flex; gap:10px; } .two>*{ flex:1; }

input[type=text],textarea{ width:100%; background:#0a0b0e; border:1px solid var(--ln2); color:var(--txt); padding:9px 11px; font-size:13px; font-family:'Pretendard',sans-serif; outline:none; transition:.15s; }
input[type=text]:focus,textarea:focus{ border-color:var(--acc); box-shadow:inset 0 0 0 1px rgba(255,255,255,.3); }
textarea{ resize:vertical; min-height:70px; line-height:1.55; }

.seg{ display:flex; border:1px solid var(--ln2); }
.seg button{ flex:1; background:#0a0b0e; color:var(--dim); border:0; padding:8px 4px; font-size:12px; font-family:var(--hud); font-weight:600; letter-spacing:.06em; cursor:pointer; transition:.12s; }
.seg button+button{ border-left:1px solid var(--ln2); } .seg button.on{ background:var(--acc); color:#111; }

.chips{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{ background:#0a0b0e; color:var(--dim2); border:1px solid var(--ln2); padding:6px 12px; font-size:12px; cursor:pointer; font-family:'Pretendard',sans-serif; transition:.12s; user-select:none;
  clip-path:polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px)); }
.chip:hover{ border-color:var(--dim); } .chip.on{ background:var(--acc); color:#111; border-color:var(--acc); font-weight:700; }

.elgrid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.elbtn{ aspect-ratio:1; background:#0a0b0e; border:1px solid var(--ln2); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:5px 2px; transition:.12s;
  clip-path:polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 7px 100%, 0 calc(100% - 7px)); }
.elbtn:hover{ border-color:var(--dim); } .elbtn.on{ border-color:var(--acc); background:#1a1a1e; box-shadow:inset 0 0 12px rgba(255,255,255,.12); }
.elbtn svg{ width:22px; height:22px; display:block; } .elbtn span{ font-size:9px; color:var(--dim); font-family:var(--hud); } .elbtn.on span{ color:var(--acc); font-weight:700; }

.cpcard{ background:#0b0d11; border:1px solid var(--ln2); padding:10px; margin-bottom:8px;
  clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
.cphd{ display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; } .cphd b{ font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--cy); }
.upl{ display:flex; align-items:center; justify-content:center; gap:6px; font-family:var(--hud); font-size:11px; letter-spacing:.06em; color:var(--acc); cursor:pointer; border:1px dashed var(--ln2); padding:7px 10px; width:100%; margin-top:7px; transition:.15s; } .upl:hover{ border-color:var(--acc); background:rgba(255,255,255,.05); } .upl input{ display:none; }
.mini{ font-family:var(--hud); font-size:10px; letter-spacing:.05em; color:var(--dim); background:none; border:0; cursor:pointer; } .mini:hover{ color:var(--acc); }
.cphint{ font-size:10px; color:var(--dim); margin-top:6px; font-family:var(--mono); letter-spacing:.01em; }
.addbtn{ width:100%; background:#0b0d11; border:1px dashed var(--ln2); color:var(--dim2); padding:10px; font-size:12px; font-family:var(--hud); font-weight:600; letter-spacing:.12em; cursor:pointer; transition:.12s; } .addbtn:hover{ border-color:var(--acc); color:var(--acc); }

/* refined minimal range slider */
input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:16px; background:transparent; cursor:pointer; margin:0; }
input[type=range]::-webkit-slider-runnable-track{ height:2px; background:var(--ln2); }
input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:11px; height:11px; margin-top:-5px; background:var(--acc); transform:rotate(45deg); }
input[type=range]::-moz-range-track{ height:2px; background:var(--ln2); }
input[type=range]::-moz-range-thumb{ width:10px; height:10px; border:0; border-radius:0; background:var(--acc); }
.rngrow{ display:flex; align-items:center; gap:11px; } .rngrow output{ font-family:var(--mono); font-size:10.5px; color:var(--dim2); min-width:38px; text-align:right; }

/* element theme presets (compact) */
.presets{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:11px; }
.preset{ width:26px; height:26px; border:1px solid var(--ln2); cursor:pointer; padding:0; position:relative;
  clip-path:polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 5px 100%, 0 calc(100% - 5px)); }
.preset svg{ width:100%; height:100%; display:block; } .preset.on{ border-color:#fff; box-shadow:0 0 0 1px #fff inset; }

.cgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.cgrid .cc{ text-align:center; } .cgrid label{ display:block; font-family:var(--hud); font-size:8.5px; letter-spacing:.1em; color:var(--dim); margin-bottom:4px; }
.cgrid input[type=color]{ width:100%; height:30px; border:1px solid var(--ln2); background:#0a0b0e; padding:2px; cursor:pointer; }

.actions{ display:flex; gap:10px; margin-top:3px; }
.btn{ border:0; padding:13px; font-family:var(--hud); font-weight:700; font-size:12px; letter-spacing:.14em; cursor:pointer; transition:.12s; text-transform:uppercase;
  clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
.btn.pri{ flex:1; background:var(--acc); color:#111; } .btn.pri:hover{ box-shadow:0 0 16px rgba(255,255,255,.4); }
.btn.ghost{ background:#0b0d11; color:var(--dim2); border:1px solid var(--ln2); padding:13px 18px; } .btn.ghost:hover{ border-color:var(--acc); color:var(--acc); }

.vp{ position:relative; border:1px solid var(--ln1); background:linear-gradient(180deg,#0e0e11,#0a0a0c); padding:16px; }
.vp::before,.vp::after{ content:""; position:absolute; width:14px; height:14px; pointer-events:none; }
.vp::before{ top:-1px; left:-1px; border-top:2px solid var(--acc); border-left:2px solid var(--acc); }
.vp::after{ bottom:-1px; right:-1px; border-bottom:2px solid var(--acc); border-right:2px solid var(--acc); }
.vphud{ display:flex; align-items:center; gap:9px; margin-bottom:12px; font-family:var(--hud); font-size:10px; letter-spacing:.2em; color:var(--dim2); text-transform:uppercase; }
.vphud .nd{ width:6px; height:6px; background:var(--acc); transform:rotate(45deg); } .vphud .fl{ flex:1; height:1px; background:linear-gradient(90deg,var(--ln2),transparent); } .vphud .dim{ font-family:var(--mono); color:var(--cy); letter-spacing:.05em; }
.scaleWrap{ overflow:auto; } .cardScale{ transform-origin:top left; } #cardHost svg{ display:block; box-shadow:0 24px 70px -28px #000; }
.legend{ margin-top:11px; font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:.02em; line-height:1.7; } .legend b{ color:var(--cy); }
</style>
</head>
<body>
<canvas id="bgdust"></canvas>
<div class="wrap">
  <div class="panel">
    <div class="topbar cut"><span class="dot"></span><span class="tt">ARCH <b>//</b> MAINTWEET FORGE</span><span class="rt">SYS::ONLINE · v5</span></div>

    <div class="mod"><div class="mh"><span class="ix">01</span><span class="nm">Identity</span><span class="fl"></span><span class="nd"></span></div>
      <div class="mb">
        <div class="field"><label class="lab">닉네임 <i>/ NICKNAME</i></label><input type="text" id="f_nick" maxlength="14"></div>
        <div class="field"><label class="lab">아이디 <i>@</i></label><input type="text" id="f_id" maxlength="24"></div>
        <div class="field two">
          <div><label class="lab">연령</label><div class="seg" id="f_adult"><button data-v="1">성인</button><button data-v="0">미성년</button></div></div>
          <div><label class="lab">타장르</label><div class="seg" id="f_other"><button data-v="1">언급 O</button><button data-v="0">언급 X</button></div></div></div>
        <div class="field"><label class="lab">닉네임 크기</label><div class="rngrow"><input type="range" id="f_nicksz" min="18" max="60" step="0.5"><output id="o_nicksz"></output></div></div>
      </div></div>

    <div class="mod"><div class="mh"><span class="ix">02</span><span class="nm">Traits</span><span class="fl"></span><span class="nd"></span></div>
      <div class="mb">
        <div class="field"><label class="lab">성향 <i>/ ORIENTATION</i></label><div class="chips" id="f_orient"></div></div>
        <div class="field"><label class="lab">계정 성향 <i>/ ACTIVITY</i></label><div class="chips" id="f_act"></div></div>
        <div class="field"><label class="lab">속성 <i>/ ELEMENT</i></label><div class="elgrid" id="f_el"></div></div>
      </div></div>

    <div class="mod"><div class="mh"><span class="ix">03</span><span class="nm">Note</span><span class="fl"></span><span class="nd"></span></div>
      <div class="mb"><div class="field"><textarea id="f_note" maxlength="240"></textarea></div></div></div>

    <div class="mod"><div class="mh"><span class="ix">04</span><span class="nm">Visual</span><span class="fl"></span><span class="nd"></span></div>
      <div class="mb">
        <div class="field"><label class="lab">대표 이미지 <i>/ HERO · 휠 줌·드래그</i></label><label class="upl" id="f_herolbl">대표 이미지 업로드<input type="file" id="f_hero" accept="image/*"></label></div>
        <div class="field"><label class="lab">커플링 <i>/ CP</i></label><div id="f_cplist"></div><button class="addbtn" id="f_cpadd">+ ADD CP</button></div>
        <div class="field"><label class="lab">CP 이름 크기</label><div class="rngrow"><input type="range" id="f_cpsz" min="14" max="56" step="0.5"><output id="o_cpsz"></output></div></div>
      </div></div>

    <div class="mod"><div class="mh"><span class="ix">05</span><span class="nm">Chroma</span><span class="fl"></span><span class="nd"></span></div>
      <div class="mb">
        <div class="field"><label class="lab">속성 테마 <i>/ PRESET</i></label><div class="presets" id="c_presets"></div></div>
        <div class="field"><div class="cgrid">
          <div class="cc"><label>ACCENT</label><input type="color" id="c_acc"></div>
          <div class="cc"><label>LINE</label><input type="color" id="c_ln"></div>
          <div class="cc"><label>BG</label><input type="color" id="c_bg"></div>
          <div class="cc"><label>TEXT</label><input type="color" id="c_fg"></div>
        </div></div>
      </div></div>

    <div class="actions"><button class="btn pri" id="b_png">▣ Export PNG</button><button class="btn ghost" id="b_reset">Reset</button></div>
  </div>

  <div class="stage">
    <div class="vp">
      <div class="vphud"><span class="nd"></span><span>Preview · Live Feed</span><span class="fl"></span><span class="dim" id="hudDim">680×880</span></div>
      <div class="scaleWrap"><div class="cardScale" id="cardScale"><div id="cardHost"></div></div></div>
      <div class="legend"><b>TIP</b> · 대표·CP 이미지 위에서 <b>휠</b>=확대/축소, <b>드래그</b>=이동. (항상 칸을 가득 채우도록 자동 보정)</div>
    </div>
  </div>
</div>

    .split('@@LN@@').join(St.line).split('@@W@@').join(W).split('@@H@@').join(H).split('@@CW@@').join(W-36).split('@@CH@@').join(H-36);
  const svg=host.querySelector('#card'); curSvg=svg;
  svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('width',W); svg.setAttribute('height',H);
  const defs=svg.querySelector('defs');

  const nk=svg.querySelector('#nickname'); nk.querySelector('tspan').textContent=St.nick||''; nk.style.fontSize=St.nickSize+'px';
  const fid=svg.querySelector('#footerId tspan'); if(fid) fid.textContent='@'+(St.id||'');
  const ft=svg.querySelector('#footer'); if(ft) ft.setAttribute('transform','translate(0 '+(H-BASE_H)+')');

  const bg=svg.querySelector('#badges'); bg.textContent='';
  (function(){ let x=53.54; const y=282.09,h=18.87,pad=12,fs=9.43,base=13.06;
    [{t:St.adult?'성인':'미성년자',on:true},{t:'타장르 언급 '+(St.other?'O':'X'),on:false}].forEach(it=>{ const w=measure(it.t,fs)+pad*2;
      bg.appendChild(mk('rect',{x:x.toFixed(2),y:y,width:w.toFixed(2),height:h,fill:it.on?St.accent:'none',stroke:it.on?'none':St.line,'stroke-width':it.on?0:0.5}));
      const t=mk('text',{x:(x+w/2).toFixed(2),y:(y+base).toFixed(2),'text-anchor':'middle','font-family':PRE,'font-size':fs,fill:it.on?'#1a0e0b':St.line}); t.textContent=it.t; bg.appendChild(t); x+=w+5.81; }); })();

  chipRow(svg.querySelector('#orientChips'),ORIENT,St.orient,343.63);
  chipRow(svg.querySelector('#actChips'),ACT,St.act,415.55);

  const ng=svg.querySelector('#noteSlot'); ng.textContent='';
  noteLines.forEach((ln,i)=>{ const t=mk('text',{x:53.54,y:(NOTE_Y+i*NOTE_LH).toFixed(2),'font-family':PRE,'font-size':11.94,fill:St.fg,'fill-opacity':0.84}); t.textContent=ln; ng.appendChild(t); });

  const eg=svg.querySelector('#elIcon'); eg.textContent=''; eg.removeAttribute('transform');
  (ICONS[St.el]||[]).forEach(d=> eg.appendChild(mk('path',{d:d,fill:St.accent})));
  const bb=eg.getBBox();
  if(bb.width&&bb.height){ const s=44/Math.max(bb.width,bb.height); eg.setAttribute('transform','translate('+(DCX-(bb.x+bb.width/2)*s).toFixed(2)+' '+(DCY-(bb.y+bb.height/2)*s).toFixed(2)+') scale('+s.toFixed(4)+')'); }

  // hero image (crop group under fade; hit on top)
  const hgrp=svg.querySelector('#hero-image'); const oh=hgrp.querySelector('#heroWrap'); if(oh) oh.remove();
  const ohit=hgrp.querySelector('.imghit'); if(ohit) ohit.remove();
  if(St.hero&&St.hero.img){ const hb=buildCrop(HERO, St.hero, 'hero', defs); if(hb){ hb.group.id='heroWrap'; hgrp.insertBefore(hb.group, hgrp.children[1]||null); if(hb.hit) hgrp.appendChild(hb.hit); } }

  // CP strips
  const cz=svg.querySelector('#cpZone'); cz.textContent='';
  St.cp.forEach((c,i)=>{ const x=DW+i*STRIP; const frame={fx:x,fy:0,fw:STRIP,fh:H};
    cz.appendChild(mk('rect',{x:x,y:0,width:STRIP,height:H,fill:(i%2)?'#221619':'#191315'}));
    let hit=null;
    if(c.img){ const cb=buildCrop(frame, c, 'cp'+i, defs); if(cb){ cz.appendChild(cb.group); hit=cb.hit; } }
    cz.appendChild(mk('rect',{x:x,y:0,width:STRIP,height:H,fill:'url(#cpGrad)'}));
    // restored pair-phrase deco (left of name)
    const dg=mk('g',{fill:St.line, transform:'translate('+(44+i*STRIP)+' '+(H-BASE_H)+')'}); CPDECO.forEach(d=> dg.appendChild(mk('path',{d:d}))); cz.appendChild(dg);
    // CP name (original placement: centered column, reads bottom->top)
    if(c.name){ const cx=x+STRIP/2; const t=mk('text',{transform:'translate('+cx+' '+(H-34)+') rotate(-90)','text-anchor':'start','dominant-baseline':'central','font-family':"'Helvetica Neue',Arial,sans-serif",'font-weight':'800','font-size':St.cpNameSize,'letter-spacing':'0.03em',fill:St.fg}); t.textContent=c.name; cz.appendChild(t); }
    if(hit) cz.appendChild(hit);
  });

  bindImg();
  if(ensureDims()) return;  // re-render fires after dims load
  curW=W; curH=H; document.getElementById('hudDim').textContent=W+'×'+H; applyScale(); save();
}

/* ---------- panel ---------- */
const $=s=>document.querySelector(s);
function syncSeg(id,val){ document.querySelectorAll('#'+id+' button').forEach(b=>b.classList.toggle('on',(b.dataset.v==='1')===val)); }
$('#f_nick').value=St.nick; $('#f_id').value=St.id; $('#f_note').value=St.note;
$('#c_acc').value=St.accent; $('#c_bg').value=St.bg; $('#c_fg').value=St.fg; $('#c_ln').value=St.line;
$('#f_nicksz').value=St.nickSize; $('#o_nicksz').textContent=St.nickSize+'px';
$('#f_cpsz').value=St.cpNameSize; $('#o_cpsz').textContent=St.cpNameSize+'px';
syncSeg('f_adult',St.adult); syncSeg('f_other',St.other);

$('#f_nick').addEventListener('input',e=>{St.nick=e.target.value;render();});
$('#f_id').addEventListener('input',e=>{St.id=e.target.value.replace(/^@+/,'');render();});
$('#f_note').addEventListener('input',e=>{St.note=e.target.value;render();});
$('#f_nicksz').addEventListener('input',e=>{St.nickSize=+e.target.value;$('#o_nicksz').textContent=St.nickSize+'px';render();});
$('#f_cpsz').addEventListener('input',e=>{St.cpNameSize=+e.target.value;$('#o_cpsz').textContent=St.cpNameSize+'px';render();});
document.querySelectorAll('#f_adult button').forEach(b=>b.addEventListener('click',()=>{St.adult=b.dataset.v==='1';syncSeg('f_adult',St.adult);render();}));
document.querySelectorAll('#f_other button').forEach(b=>b.addEventListener('click',()=>{St.other=b.dataset.v==='1';syncSeg('f_other',St.other);render();}));

function chipUI(host,list,key){ const c=$(host); c.innerHTML='';
  list.forEach(label=>{ const d=document.createElement('div'); d.className='chip'+(St[key].indexOf(label)>=0?' on':''); d.textContent=label;
    d.addEventListener('click',()=>{ const k=St[key].indexOf(label); if(k>=0)St[key].splice(k,1); else St[key].push(label); d.classList.toggle('on'); render(); }); c.appendChild(d); }); }
chipUI('#f_orient',ORIENT,'orient'); chipUI('#f_act',ACT,'act');

const elg=$('#f_el');
EL.forEach(name=>{ const b=document.createElement('div'); b.className='elbtn'+(St.el===name?' on':'');
  b.innerHTML='<svg viewBox="0 0 1327 1185" fill="'+(St.el===name?St.accent:'#5b5b62')+'">'+(ICONS[name]||[]).map(d=>'<path d="'+d+'"></path>').join('')+'</svg><span>'+name+'</span>';
  b.addEventListener('click',()=>{St.el=name;document.querySelectorAll('.elbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');recolorMini();render();}); elg.appendChild(b); });
function fitSvgIcons(sel,m){ document.querySelectorAll(sel).forEach(s=>{ try{const bb=s.getBBox(); if(bb.width)s.setAttribute('viewBox',(bb.x-m)+' '+(bb.y-m)+' '+(bb.width+2*m)+' '+(bb.height+2*m)); }catch(e){} }); }
function recolorMini(){ document.querySelectorAll('.elbtn').forEach((b,i)=>b.querySelector('svg').setAttribute('fill',EL[i]===St.el?St.accent:'#5b5b62')); }

// element-theme presets (compact, small icons)
const pc=$('#c_presets');
EL.forEach(name=>{ const col=ETHEME[name]; const b=document.createElement('button'); b.className='preset'+(St.accent===col?' on':''); b.title=name+' 테마'; b.style.background=col;
  b.innerHTML='<svg viewBox="0 0 1327 1185" fill="rgba(0,0,0,.55)">'+(ICONS[name]||[]).map(d=>'<path d="'+d+'"></path>').join('')+'</svg>';
  b.addEventListener('click',()=>{St.accent=col;$('#c_acc').value=col;syncPresets();recolorMini();render();}); pc.appendChild(b); });
function syncPresets(){ document.querySelectorAll('.preset').forEach((b,i)=>b.classList.toggle('on',St.accent===ETHEME[EL[i]])); }

$('#c_acc').addEventListener('input',e=>{St.accent=e.target.value;syncPresets();recolorMini();render();});
$('#c_bg').addEventListener('input',e=>{St.bg=e.target.value;render();});
$('#c_fg').addEventListener('input',e=>{St.fg=e.target.value;render();});
$('#c_ln').addEventListener('input',e=>{St.line=e.target.value;render();});

function readImg(file,cb){ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); }
$('#f_hero').addEventListener('change',e=>{ const f=e.target.files[0]; if(f) readImg(f,d=>{St.hero={img:d}; $('#f_herolbl').firstChild.nodeValue='✓ 대표 이미지 변경'; render();}); });

function cpPanel(){ const wrap=$('#f_cplist'); wrap.innerHTML='';
  St.cp.forEach((c,i)=>{ const card=document.createElement('div'); card.className='cpcard';
    card.innerHTML='<div class="cphd"><b>CP_'+String(i+1).padStart(2,'0')+'</b><button class="mini" data-rm="'+i+'">✕ 삭제</button></div>'+
      '<input type="text" placeholder="이름 (제한 없음)" data-nm="'+i+'" value="'+(c.name||'').replace(/"/g,'&quot;')+'">'+
      '<label class="upl">'+(c.img?'✓ 이미지 변경':'이미지 업로드')+'<input type="file" accept="image/*" data-img="'+i+'"></label>'+
      (c.img?'<div class="cphint">휠=확대/축소 · 드래그=이동 · <a class="mini" data-fit="'+i+'" style="text-decoration:underline">위치 초기화</a></div>':'');
    wrap.appendChild(card); });
  wrap.querySelectorAll('[data-nm]').forEach(inp=>inp.addEventListener('input',e=>{St.cp[+inp.dataset.nm].name=e.target.value;render();}));
  wrap.querySelectorAll('[data-img]').forEach(inp=>inp.addEventListener('change',e=>{const f=e.target.files[0];const i=+inp.dataset.img;if(f)readImg(f,d=>{St.cp[i].img=d;St.cp[i].iw=null;St.cp[i].ih=null;St.cp[i].zoom=1;St.cp[i].ox=null;St.cp[i].oy=null;cpPanel();render();});}));
  wrap.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{St.cp.splice(+b.dataset.rm,1);cpPanel();render();}));
  wrap.querySelectorAll('[data-fit]').forEach(b=>b.addEventListener('click',()=>{const i=+b.dataset.fit;St.cp[i].zoom=1;St.cp[i].ox=null;St.cp[i].oy=null;render();}));
  $('#f_cpadd').style.display=St.cp.length>=MAXCP?'none':'block';
}
$('#f_cpadd').addEventListener('click',()=>{ if(St.cp.length<MAXCP){St.cp.push({name:'',img:null});cpPanel();render();} });
cpPanel();
if(St.hero&&St.hero.img) $('#f_herolbl').firstChild.nodeValue='✓ 대표 이미지 변경';

$('#b_reset').addEventListener('click',()=>{ if(confirm('모든 입력을 초기화할까요?')){ localStorage.removeItem(KEY); location.reload(); } });

function dl(blob,fname){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=fname; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),3000); }
$('#b_png').addEventListener('click',()=>{ const svg=document.querySelector('#card').cloneNode(true);
  svg.setAttribute('width',curW*2); svg.setAttribute('height',curH*2);
  const xml=new XMLSerializer().serializeToString(svg); const img=new Image();
  img.onload=()=>{ const c=document.createElement('canvas'); c.width=curW*2; c.height=curH*2; c.getContext('2d').drawImage(img,0,0); c.toBlob(b=>dl(b,'arch_maintweet.png'),'image/png'); };
  img.onerror=()=>alert('PNG 변환 실패 — 다른 브라우저에서 시도해 주세요.');
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml); });

function applyScale(){ const sw=document.querySelector('.scaleWrap'); const avail=sw.clientWidth; const s=Math.min(1,avail/curW);
  const sc=document.getElementById('cardScale'); sc.style.transform='scale('+s+')'; sc.style.height=(curH*s)+'px'; sc.style.width=curW+'px'; }
window.addEventListener('resize',applyScale);

/* ---------- space dust background ---------- */
(function(){ const cv=document.getElementById('bgdust'); if(!cv) return; const ctx=cv.getContext('2d'); let w,h,dpr,dots,raf;
  function init(){ dpr=Math.min(2,window.devicePixelRatio||1); w=cv.width=Math.floor(innerWidth*dpr); h=cv.height=Math.floor(innerHeight*dpr); cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
    const n=Math.min(260,Math.floor(innerWidth*innerHeight/8200)); dots=[];
    for(let i=0;i<n;i++) dots.push({x:Math.random()*w,y:Math.random()*h,z:Math.random(),r:(Math.random()*1.4+0.25)*dpr,vx:(Math.random()-0.5)*0.05*dpr,vy:(Math.random()*0.05+0.012)*dpr,a:Math.random()*0.5+0.12,tw:Math.random()*6.283,ts:Math.random()*0.016+0.004}); }
  function frame(){ ctx.clearRect(0,0,w,h); for(const d of dots){ d.x+=d.vx; d.y+=d.vy; d.tw+=d.ts; if(d.y>h+3){d.y=-3;d.x=Math.random()*w;} if(d.x<-3)d.x=w+3; else if(d.x>w+3)d.x=-3;
    const al=d.a*(0.5+0.5*Math.sin(d.tw)); ctx.beginPath(); ctx.arc(d.x,d.y,d.r*(0.6+d.z),0,6.2832); ctx.fillStyle='rgba(255,255,255,'+al.toFixed(3)+')'; ctx.fill(); } raf=requestAnimationFrame(frame); }
  function start(){ cancelAnimationFrame(raf); frame(); } init(); start();
  window.addEventListener('resize',init); document.addEventListener('visibilitychange',()=>{ if(document.hidden) cancelAnimationFrame(raf); else start(); }); })();

(document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve()).then(()=>{ render(); fitSvgIcons('.elbtn svg',60); fitSvgIcons('.preset svg',150); });
render();
</script>
